version: '3.8'
services:
  db:
    image: postgres:15
    container_name: rut-psql-lab
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - flightstat_data:/var/lib/postgresql/data
    networks:
      - db-network
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: postgres
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - db-network

  analytics-job:
    build: ../python/
    container_name: analytics-job
    depends_on:
      - db
    networks:
      - db-network
    environment:
      DB_DSN: postgresql://postgres:postgres@db:5432/postgres
    volumes:
      - ../resources/templates:/app/out
    profiles: ["manual"]

networks:
  db-network:
    driver: bridge

volumes:
  flightstat_data: